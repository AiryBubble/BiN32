<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">
<title>パスワードジェネレーター</title>
<style>@font-face{font-family:"BIZ UDPGothic";src:local("BIZ UDPGothic Regular"),local("BIZUDPGothic-Regular"),url(/BIZUDPGothic-Regular.woff2) format("woff2");font-style:normal;font-display:swap}body{font-family:"BIZ UDPGothic";text-align:center;padding:20px}input{font-size:18px;padding:8px;margin:10px;width:300px}#generate-btn{font-size:16px;padding:10px 20px;background:#57e;border:none;border-radius:4px;cursor:pointer}*{color:#240786}</style>
</head>
<body>
<div>
<input id="length" type="number" value="16" min="16" max="256">
<br>
<input id="password-output" type="text" readonly placeholder="ここに生成されます">
<br>
<button id="generate-btn">パスワードを生成</button>
</div>
<script>const generateBtn=document.getElementById("generate-btn");const output=document.getElementById("password-output");const lengthInput=document.getElementById("length");const chars="abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()";function secureRandom(max){const array=new Uint32Array(1);crypto.getRandomValues(array);return array[0]%max}function generatePassword(length){let result="";for(let i=0;i<length;i+=1){result+=chars[secureRandom(chars.length)]}return result}generateBtn.addEventListener("click",()=>{const length=parseInt(lengthInput.value)||16;output.value=generatePassword(length)});output.addEventListener("click",()=>{navigator.clipboard.writeText(output.value)});</script>
</body>
</html>
