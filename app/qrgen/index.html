<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">
  <title>QRジェネレーター</title>
<script src="jquery.js"></script>
<script src="qrcode.js"></script>
<style>@font-face{font-family:"BIZ UDGothic";src:local("BIZ UDGothic Regular"),local("BIZUDGothic-Regular"),url(/BIZUDGothic-Regular.woff2) format("woff2");font-style:normal;font-display:swap}body{font-family:"BIZ UDGothic";}#qrcode{ margin-top: 10px; }button{ padding:10px 20px;background-color: #57e;border:none;border-radius:4px;cursor:pointer }*{ color: #240786 }</style>
</head>
<body>
    <input type="text" id="qrText" placeholder="テキストまたはURLを入力">
    <button id="generate">QRを生成</button>
    <div id="qrcode"></div>
<script>$(function(){var qr;$('#generate').click(function(){var inputText=$('#qrText').val();$('#qrcode').empty();qr=new QRCode(document.getElementById("qrcode"),{text:inputText,width:256,height:256,colorDark:"#000000",colorLight:"#ffffff",correctLevel:QRCode.CorrectLevel.H})})})</script>
</html>
